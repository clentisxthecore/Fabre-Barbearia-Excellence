<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabre | Barbearia Premium em Juiz de Fora</title>
    <!-- Fontes Premium -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0a;
            --accent-gold: #bfa67a; /* Tom de ouro velho para o look 'cozy' */
            --text-main: #e0e0e0;
            --text-soft: #888888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            height: 500vh; /* Espaço para o scroll longo e fluido */
        }

        /* Fundo com Gradiente imersivo */
        .background-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0a0a0a 100%);
            z-index: -2;
        }

        /* Brilho suave no centro (Soft Look) */
        .soft-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vh;
            background: radial-gradient(circle, rgba(191, 166, 122, 0.03) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* Container da Navalha (Fixa enquanto o texto rola) */
        .viewport-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }

        /* A Navalha voando */
        .razor-3d {
            width: 500px; /* Tamanho base */
            max-width: 80vw;
            will-change: transform;
            /* Início da animação: Esquerda superior, pequena e girada */
            transform: translate(-60vw, -40vh) rotateX(45deg) rotateY(-45deg) scale(0.5);
            transition: transform 0.1s ease-out;
            filter: drop-shadow(0 30px 60px rgba(0,0,0,0.9));
        }

        .razor-3d img {
            width: 100%;
            display: block;
            border-radius: 10px; /* Suaviza as bordas se a imagem for retangular */
        }

        /* Seções de Texto */
        section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 10%;
            position: relative;
            z-index: 20;
        }

        h1, h2 {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            max-width: 900px;
        }

        .hero-title {
            font-size: 6rem;
            letter-spacing: -2px;
            opacity: 1;
            transform: translateY(0);
        }

        .subtitle {
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 8px;
            font-size: 0.8rem;
            color: var(--accent-gold);
            margin-bottom: 20px;
        }

        .impact-text {
            font-size: 3.5rem;
            line-height: 1.2;
            opacity: 0;
            transform: translateY(50px);
            transition: all 1s ease;
        }

        .impact-text span {
            color: var(--accent-gold);
            font-style: italic;
        }

        /* Botão Final */
        .btn-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-premium {
            pointer-events: all;
            background: transparent;
            color: white;
            border: 1px solid var(--accent-gold);
            padding: 22px 60px;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-decoration: none;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            overflow: hidden;
            position: relative;
        }

        .btn-premium:hover {
            background: var(--accent-gold);
            color: black;
            box-shadow: 0 0 50px rgba(191, 166, 122, 0.4);
            transform: scale(1.05);
        }

        /* Fade-in nas frases conforme o scroll */
        .active {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }

        @media (max-width: 768px) {
            .hero-title { font-size: 3.5rem; }
            .impact-text { font-size: 2rem; }
            .razor-3d { width: 300px; }
        }
    </style>
</head>
<body>

    <div class="background-gradient"></div>
    <div class="soft-glow"></div>

    <!-- Navalha que voa -->
    <div class="viewport-container">
        <div class="razor-3d" id="razor">
            <!-- Coloque sua imagem aqui -->
            <img src="navalha.jpg" alt="Navalha Fabre">
        </div>
    </div>

    <!-- Conteúdo em Camadas -->
    <section>
        <p class="subtitle">Bem-vindo à</p>
        <h1 class="hero-title">Fabre</h1>
    </section>

    <section>
        <h2 class="impact-text" id="text1">
            A melhor experiência de <span>barbearia</span>,<br>em Granbery, Juiz de Fora.
        </h2>
    </section>

    <section>
        <h2 class="impact-text" id="text2">
            Design minimalista,<br><span>precisão absoluta.</span>
        </h2>
    </section>

    <section>
        <h2 class="impact-text" id="text3">
            Sinta o controle de quem<br><span>domina o estilo.</span>
        </h2>
    </section>

    <section class="btn-container">
        <a href="https://wa.me/5532991118053" class="btn-premium">Agendar Agora</a>
    </section>

    <script>
        const razor = document.getElementById('razor');
        const texts = [
            document.getElementById('text1'),
            document.getElementById('text2'),
            document.getElementById('text3')
        ];

        window.addEventListener('scroll', () => {
            const scrollPos = window.scrollY;
            const windowHeight = window.innerHeight;
            const totalHeight = document.body.offsetHeight - windowHeight;
            const scrollPercent = scrollPos / totalHeight;

            // --- CÁLCULO DO VOO DA NAVALHA ---
            
            // Movimento de um canto ao outro (Esquerda para Direita, Cima para Baixo)
            const moveX = (scrollPercent * 160) - 60; // Inicia em -60vw vai até +100vw
            const moveY = (scrollPercent * 120) - 40; // Inicia em -40vh vai até +80vh
            
            // Rotações 3D Complexas
            const rotX = scrollPercent * 720; // Gira duas vezes no eixo X
            const rotZ = (scrollPercent * 360) - 45; // Gira no eixo da lâmina
            
            // Escala (Aumenta conforme chega no meio, depois diminui)
            const scale = 0.5 + Math.sin(scrollPercent * Math.PI) * 0.8;

            razor.style.transform = `
                translate(${moveX}vw, ${moveY}vh) 
                rotateX(${rotX}deg) 
                rotateZ(${rotZ}deg) 
                scale(${scale})
            `;

            // --- CONTROLE DE OPACIDADE DOS TEXTOS ---
            texts.forEach((text, index) => {
                const sectionStart = (index + 1) * 0.2;
                const sectionEnd = sectionStart + 0.15;

                if (scrollPercent > sectionStart && scrollPercent < sectionEnd) {
                    text.classList.add('active');
                } else {
                    text.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
